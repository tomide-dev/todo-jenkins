<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid #eee;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .todo-text {
      flex: 1;
    }

    .completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .done-btn {
      background: #28a745;
      padding: 5px 10px;
    }

    .del-btn {
      background: #dc3545;
      padding: 5px 10px;
    }
  </style>
</head>

<body>
  <h1>My Todo List</h1>

  <div class="input-area">
    <input
      type="text"
      id="todoInput"
      placeholder="Enter a new todo..."
    />
    <button onclick="addTodo()">Add</button>
  </div>

  <div id="todoList"></div>

  <script>
    async function loadTodos() {
      const res = await fetch('/api/todos');
      const todos = await res.json();

      const list = document.getElementById('todoList');
      list.innerHTML = '';

      todos.forEach(todo => {
        const div = document.createElement('div');
        div.className =
          'todo-item' + (todo.completed ? ' completed' : '');

        div.innerHTML =
          '<span class="todo-text">' + todo.text + '</span>' +
          '<button class="done-btn" onclick="toggleTodo(' + todo.id + ')">' +
          (todo.completed ? 'Undo' : 'Done') +
          '</button>' +
          '<button class="del-btn" onclick="deleteTodo(' + todo.id + ')">' +
          'Delete</button>';

        list.appendChild(div);
      });
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();

      if (!text) return;

      await fetch('/api/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id) {
      await fetch('/api/todos/' + id, { method: 'PUT' });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch('/api/todos/' + id, { method: 'DELETE' });
      loadTodos();
    }

    document
      .getElementById('todoInput')
      .addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addTodo();
      });

    loadTodos();
  </script>
</body>
</html>
